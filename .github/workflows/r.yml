name: R-CMD-check

on:
  push:
    branches: [ "master", "dev" ]
    paths:
      - ".github/workflows/r.yml"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "R/**"
      - "man/**"
      - "tests/**"
      - "vignettes/**"
  pull_request:
    branches: [ "master" ]
    paths:
      - ".github/workflows/r.yml"
      - "DESCRIPTION"
      - "NAMESPACE"
      - "R/**"
      - "man/**"
      - "tests/**"
      - "vignettes/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Check
        shell: Rscript {0}
        run: |
          rcmdcheck::rcmdcheck(args = c("--no-manual", "--as-cran"), error_on = "error")
